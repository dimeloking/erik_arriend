# Validate commit messages
commit-msg:
  jobs:
    - name: commitlint
      run: npx --no -- commitlint --edit {1}

# Validate content before committing
pre-commit:
  jobs:
    - name: ultracite
      run: npx ultracite fix src tests .storybook checkly.config.ts commitlint.config.ts drizzle.config.ts knip.config.ts next.config.ts oxlint.config.ts oxfmt.config.ts playwright.config.ts vitest.config.ts package.json tsconfig.json --type-aware --type-check
      glob:
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.json'
        - '**/*.jsonc'
        - '**/*.css'
      stage_fixed: true
    - name: knip
      glob: '*'
      run: npm run check:deps
